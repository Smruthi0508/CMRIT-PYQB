<!DOCTYPE html>
<html>

    <title>CMRIT-PYQB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>CMRIT Previous Year Question Bank</h1>

<input type="text" id="searchBox" placeholder="Search subject or paper..." onkeyup="searchData()" />

<h2>Branches</h2>
<div id="branchList" class="card-container"></div>

<h2>Years</h2>
<div id="yearList" class="card-container"></div>

<h2>Semesters</h2>
<div id="semList" class="card-container"></div>

<h2>Subjects</h2>
<div id="subjectList" class="card-container"></div>

<h2>Question Papers</h2>
<div id="qpList" class="card-container"></div>

<h2>Search Results</h2>
<div id="searchResults" class="card-container"></div>

<script src="script.js"></script>

</body>
</html>
